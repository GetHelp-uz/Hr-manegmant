packages:
  "html5-qrcode": "For camera-based QR code scanning"
  "react-qr-code": "For rendering employee QR codes"
  "zustand": "Lightweight global state management for language and UI state"
  "date-fns": "For formatting dates and times"
  "recharts": "For dashboard and report analytics charts"

images:
  - path: "artifacts/hr-platform/public/images/auth-bg.png"
    description: "Abstract geometric modern corporate background in deep navy and blue tones with subtle glowing mesh gradients"
    aspect_ratio: "16:9"
  - path: "artifacts/hr-platform/public/images/logo-mark.png"
    description: "Minimalist modern abstract logo mark for a tech company, geometric shape, deep blue and teal, transparent background"
    aspect_ratio: "1:1"

notes:
  - The API client hooks are generated in @workspace/api-client-react
  - Auth relies on HTTP-only cookies, so all requests must include credentials: "include" (which customFetch usually handles)
  - QR Scanning uses the device camera via html5-qrcode
